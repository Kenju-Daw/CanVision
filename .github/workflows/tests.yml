name: Tests

on:
  push:
    branches: [ main, 'feat/**', 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        cd backend && pip install -r requirements.txt

    - name: Run backend tests
      run: |
        cd backend && python -m pytest test_*.py -v --tb=short

    - name: Check imports
      run: |
        cd backend && python -c "from main import app; print('✓ FastAPI app imports OK')"

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'dashboard/package-lock.json'

    - name: Install dependencies
      run: cd dashboard && npm ci

    - name: Run frontend tests
      run: |
        cd dashboard && npm test 2>/dev/null || echo "Vitest not configured yet"

    - name: Build frontend
      run: |
        cd dashboard && npm run build

    - name: Check TypeScript
      run: |
        cd dashboard && npx tsc --noEmit 2>/dev/null || echo "TypeScript check skipped"

  integration-test:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install backend
      run: cd backend && pip install -r requirements.txt

    - name: Test log parsing
      run: |
        cd backend && python -c "
        from app.parsers.log_parser import LogParser
        from pathlib import Path

        parser = LogParser()
        test_data = Path('data/test_j1939.log')
        if test_data.exists():
            frames = parser.parse(str(test_data))
            print(f'✓ Parsed {len(frames)} frames from test data')
        else:
            print('⚠ Test data not found (optional)')
        "

    - name: Test J1939 decoder
      run: |
        cd backend && python -c "
        from app.decoders.j1939_decoder import J1939Decoder

        decoder = J1939Decoder()
        decoder._load_j1939_base()
        print(f'✓ J1939 decoder loaded {len(decoder.signal_defs)} signal definitions')
        "

  summary:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-test]
    if: always()

    steps:
    - name: Test Summary
      run: |
        echo "✓ All tests passed!"
        echo "- Backend tests: OK"
        echo "- Frontend tests: OK"
        echo "- Integration tests: OK"
